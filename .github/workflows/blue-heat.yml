name: Generate Blue Heat Pulse

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ADITH6452003
          outputs: |
            dist/snake.svg

      - name: Convert to Blue Heat
        run: |
          if [ ! -f dist/snake.svg ]; then
            echo "snake.svg not generated"
            exit 1
          fi

          cat dist/snake.svg \
          | sed 's/#39d353/#00e5ff/g' \
          | sed 's/#26a641/#0099cc/g' \
          | sed 's/#006d32/#0066ff/g' \
          | sed 's/#0e4429/#001a33/g' \
          > dist/blue-heat.svg

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
